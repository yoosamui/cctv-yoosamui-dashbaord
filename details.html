<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Media Viewer</title>

<style>
body {
    margin: 0;
    background: #07111f;
    color: #eff6ff;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
}

.container {
    width: 95%;
    max-width: 1200px;
    text-align: center;
    padding: 20px;
}

video,
img {
    width: 100%;
    max-height: 80vh;
    border-radius: 12px;
    object-fit: contain;
}

.controls {
    margin-top: 15px;

    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <video id="player" controls style="display:none">
        <source id="videoSource" src="" type="video/mp4">
    </video>

    <img id="image" alt="" style="display:none">

    <div id="controls" class="controls" style="display:none">
        <button type="button" onclick="skip(-30)">⏪ -30s</button>
        <button type="button" onclick="skip(-10)">⏪ -10s</button>
        <button type="button" onclick="skip(-1)">◀ -1s</button>

        <button type="button" onclick="skip(1)">▶ +1s</button>
        <button type="button" onclick="skip(10)">⏩ +10s</button>
        <button type="button" onclick="skip(30)">⏩ +30s</button>
    </div>

</div>

<script>

const IMAGE_EXTENSIONS = ["jpg", "jpeg", "png", "gif", "bmp", "webp"];

const params = new URLSearchParams(window.location.search);
const media = params.get("video");

const player = document.getElementById("player");
const source = document.getElementById("videoSource");
const image = document.getElementById("image");
const controls = document.getElementById("controls");

// The media URL is the preview endpoint, e.g.
// /api/preview?path=/storage/2026-06-12/cam/snapshot.jpg
// Read the extension from the inner "path" param, falling back to
// the URL itself, so we know whether to show an image or a video.
function mediaExtension(url) {
    let target = url || "";
    try {
        const parsed = new URL(url, window.location.href);
        target = parsed.searchParams.get("path") || parsed.pathname;
    } catch (e) {
        // url was relative/odd; fall back to the raw string
    }
    const match = /\.([a-z0-9]+)(?:$|\?)/i.exec(target);
    return match ? match[1].toLowerCase() : "";
}

const isImage = IMAGE_EXTENSIONS.includes(mediaExtension(media));

if (isImage) {
    image.src = media;
    image.style.display = "";
} else {
    source.src = media;
    player.load();
    player.style.display = "";
    controls.style.display = "";
}

player.addEventListener('seeked', () => {
    console.log('SEEKED TO:', player.currentTime);
});

player.addEventListener('seeking', () => {
    console.log('SEEKING TO:', player.currentTime);
});

function skip(seconds) {

    console.log(
        "BEFORE:",
        player.currentTime,
        player.duration
    );

    // duration is NaN until metadata loads; only clamp the
    // upper bound when we actually know the duration.
    let target = player.currentTime + seconds;
    target = Math.max(0, target);
    if (!isNaN(player.duration)) {
        target = Math.min(player.duration, target);
    }
    player.currentTime = target;

    setTimeout(() => {
        console.log(
            "AFTER:",
            player.currentTime
        );
    }, 500);
}

</script>

</body>
</html>
