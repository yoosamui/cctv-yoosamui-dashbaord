<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Video Viewer</title>

<style>
body {
    margin: 0;
    background: #07111f;
    color: #eff6ff;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
}

.container {
    width: 95%;
    max-width: 1200px;
    text-align: center;
    padding: 20px;
}

video {
    width: 100%;
    max-height: 80vh;
    border-radius: 12px;
}

.controls {
    margin-top: 15px;

    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <video id="player" controls>
        <source id="videoSource" src="" type="video/mp4">
    </video>

    <div class="controls">
        <button type="button" onclick="skip(-30)">⏪ -30s</button>
        <button type="button" onclick="skip(-10)">⏪ -10s</button>
        <button type="button" onclick="skip(-1)">◀ -1s</button>

        <button type="button" onclick="skip(1)">▶ +1s</button>
        <button type="button" onclick="skip(10)">⏩ +10s</button>
        <button type="button" onclick="skip(30)">⏩ +30s</button>
    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const video = params.get("video");

const player = document.getElementById("player");
const source = document.getElementById("videoSource");

source.src = video;
player.load();

player.addEventListener('seeked', () => {
    console.log('SEEKED TO:', player.currentTime);
});

player.addEventListener('seeking', () => {
    console.log('SEEKING TO:', player.currentTime);
});

function skip(seconds) {

    console.log(
        "BEFORE:",
        player.currentTime,
        player.duration
    );

    // duration is NaN until metadata loads; only clamp the
    // upper bound when we actually know the duration.
    let target = player.currentTime + seconds;
    target = Math.max(0, target);
    if (!isNaN(player.duration)) {
        target = Math.min(player.duration, target);
    }
    player.currentTime = target;

    setTimeout(() => {
        console.log(
            "AFTER:",
            player.currentTime
        );
    }, 500);
}

</script>

</body>
</html>
