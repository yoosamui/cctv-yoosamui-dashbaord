<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footage - CCTV Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Arial, Helvetica, sans-serif;
            background: #07111f;
            color: #eff6ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #10253a 0%, #07111f 45%, #040b13 100%);
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }

        .menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            margin: 0 0 24px;
            padding: 0;
        }

        .menu a {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #eff6ff;
            text-decoration: none;
            font-weight: 600;
        }

        .card {
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.35);
            margin-bottom: 18px;
        }

        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .search-input {
            flex: 1 1 320px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.95);
            color: #eff6ff;
        }

        .filter-select {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.95);
            color: #eff6ff;
        }

        .btn {
            border: 1px solid rgba(56, 189, 248, 0.35);
            background: rgba(56, 189, 248, 0.14);
            color: #eff6ff;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
        }

        .hint {
            color: #bfdbfe;
            font-size: 0.95rem;
            margin-top: -6px;
            margin-bottom: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.92);
        }

        .thumb-cell {
            width: 148px;
        }

        .thumb-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 148px;
        }

        .thumb {
            width: 148px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(30, 41, 59, 0.95);
        }

        .thumb-icon {
            width: 148px;
            height: 100px;
            display: grid;
            place-items: center;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(129, 140, 248, 0.18));
            color: #e0f2fe;
            font-size: 1.35rem;
            font-weight: 700;
        }

        .thumb-caption {
            font-size: 0.85rem;
            color: #dbeafe;
            text-align: center;
            word-break: break-word;
        }

        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.14);
            text-align: left;
            vertical-align: top;
            font-size: 0.95rem;
        }

        th {
            color: #bae6fd;
            background: rgba(30, 41, 59, 0.95);
        }

        .muted {
            color: #bfdbfe;
        }

        .status {
            color: #bbf7d0;
            font-weight: 600;
        }

        .pager {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 12px;
        }

        .pager-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pager button {
            border: 1px solid rgba(56, 189, 248, 0.35);
            background: rgba(56, 189, 248, 0.12);
            color: #eff6ff;
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .pager button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        h1,
        h2 {
            margin-top: 0;
        }

        p {
            color: #dbeafe;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <main class="page">
        <nav aria-label="Primary navigation">
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="footage.html">Footage</a></li>
                <li><a href="infos.html">Infos</a></li>
            </ul>
        </nav>

        <section class="card">
            <h1>Footage</h1>
            <p>Search the stored camera files in <strong>/media/pi/share/cameras/cctv-storage</strong> using the syntax
                below.</p>
        </section>

        <section class="card">
            <div class="search-row">
                <input id="query" class="search-input" type="text" placeholder="Example: 2026-06-12 14:30 or today" />
                <select id="typeFilter" class="filter-select" aria-label="Media type filter">
                    <option value="all">All media</option>
                    <option value="video">Videos only</option>
                    <option value="image">Images only</option>
                </select>
                <button id="searchBtn" class="btn" type="button">Search</button>
            </div>
            <p class="hint">Accepted forms: <strong>[date] [time]</strong>, <strong>[time]</strong>,
                <strong>[date]</strong>, or
                <strong>today</strong> for the current day.
            </p>
            <div id="status" class="status">Ready to scan camera folders.</div>
            <div id="results" style="margin-top: 14px; overflow-x:auto;"></div>
        </section>
    </main>

    <script>
        const apiCandidates = ['/api/footage', 'http://127.0.0.1:8881/api/footage'];
        const PAGE_SIZE = 50;
        const queryInput = document.getElementById('query');
        const typeFilter = document.getElementById('typeFilter');
        const resultsBox = document.getElementById('results');
        const statusBox = document.getElementById('status');
        let allItems = [];
        let currentPage = 1;

        typeFilter.value = 'all';

        function previewUrlFor(path) {
            const base = window.location.port === '8880' ? '/api/preview' : 'http://127.0.0.1:8881/api/preview';
            return `${base}?path=${encodeURIComponent(path)}`;
        }

        function renderTable(items) {
            const selectedType = (typeFilter.value || 'all').toLowerCase();
            const filteredItems = selectedType === 'all'
                ? items
                : items.filter(item => (item.kind || '').toLowerCase() === selectedType);

            allItems = filteredItems || [];
            currentPage = 1;

            if (!allItems.length) {
                resultsBox.innerHTML = '<p class="muted">No footage matched this query.</p>';
                return;
            }

            renderPage();
        }

        function renderPage() {
            const totalPages = Math.ceil(allItems.length / PAGE_SIZE) || 1;
            const safePage = Math.min(currentPage, totalPages);
            currentPage = safePage;

            const start = (currentPage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageItems = allItems.slice(start, end);
            const rows = pageItems.map(item => `
                <tr>
                    <td class="thumb-cell">${renderThumb(item)}</td>
                    <td>${escapeHtml(item.name || '')}</td>
                    <td>${escapeHtml(item.kind || '')}</td>
                    <td>${escapeHtml(item.modified || '')}</td>
                    <td>${escapeHtml(item.size || '')}</td>
                    <td><a href="${escapeHtml(previewUrlFor(item.path || ''))}" target="_blank" rel="noreferrer">Open</a></td>
                </tr>
            `).join('');

            const pageLabel = `Page ${currentPage} of ${totalPages}`;
            const rangeStart = start + 1;
            const rangeEnd = Math.min(end, allItems.length);

            resultsBox.innerHTML = `
                <div>
                    <table>
                        <thead>
                            <tr>
                                <th class="thumb-cell">Preview</th>
                                <th>Filename</th>
                                <th>Type</th>
                                <th>Modified</th>
                                <th>Size</th>
                                <th>Open</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="pager">
                        <div class="muted">Showing ${rangeStart}-${rangeEnd} of ${allItems.length} items</div>
                        <div class="pager-buttons">
                            <button type="button" id="prevPageBtn" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
                            <button type="button" id="nextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
                            <button type="button" id="pageLabelBtn" disabled>${pageLabel}</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('prevPageBtn')?.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage -= 1;
                    renderPage();
                }
            });

            document.getElementById('nextPageBtn')?.addEventListener('click', () => {
                if (currentPage < Math.ceil(allItems.length / PAGE_SIZE)) {
                    currentPage += 1;
                    renderPage();
                }
            });

            hydratePreviewImages();
        }

        function renderThumb(item) {
            const kind = (item.kind || '').toLowerCase();
            const cameraLabel = escapeHtml(item.camera || 'Unknown camera');
            const preview = kind === 'image'
                ? `<img class="thumb preview-thumb" data-path="${escapeHtml(item.path || '')}" src="" alt="${escapeHtml(item.name || 'Image preview')}" />`
                : `<div class="thumb-icon" aria-label="Video preview">▶</div>`;
            return `<figure class="thumb-card">${preview}<figcaption class="thumb-caption">${cameraLabel}</figcaption></figure>`;
        }

        async function hydratePreviewImages() {
            const images = document.querySelectorAll('.preview-thumb');

            for (const image of images) {
                const path = image.getAttribute('data-path');
                if (!path) continue;

                const previousUrl = image.dataset.objectUrl;
                if (previousUrl) {
                    URL.revokeObjectURL(previousUrl);
                }

                try {
                    const response = await fetch(previewUrlFor(path));
                    if (!response.ok) throw new Error(`Preview failed (${response.status})`);
                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);
                    image.dataset.objectUrl = objectUrl;
                    image.src = objectUrl;
                    image.alt = image.alt || 'Image preview';
                } catch (error) {
                    image.alt = 'Preview unavailable';
                    image.title = 'Preview unavailable';
                }
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        async function searchFootage() {
            const query = queryInput.value.trim();
            if (!query) {
                statusBox.textContent = 'Enter a search term, date/time filter, or today.';
                return;
            }

            statusBox.textContent = 'Searching camera folders…';
            resultsBox.innerHTML = '';

            let lastError = null;

            for (const apiBase of apiCandidates) {
                try {
                    const response = await fetch(`${apiBase}?query=${encodeURIComponent(query)}`);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    const typeLabel = typeFilter.value === 'all' ? 'all media' : typeFilter.value + 's';
                    statusBox.textContent = `Found ${data.count} result(s) for ${typeLabel} under ${data.root}.`;
                    renderTable(data.items || []);
                    return;
                } catch (error) {
                    lastError = error;
                }
            }

            statusBox.textContent = 'Search failed. Start the API server with: python3 scripts/footage_api.py';
            resultsBox.innerHTML = '<p class="muted">Unable to reach the footage API.</p>';
        }

        document.getElementById('searchBtn').addEventListener('click', searchFootage);
        queryInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                searchFootage();
            }
        });
    </script>
</body>

</html>
